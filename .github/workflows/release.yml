name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          name="reclaim_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v}" -o "dist/${name}/reclaim" .
          cp README.md LICENSE "dist/${name}/"
          cd dist
          tar -czf "${name}.tar.gz" "${name}"
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: reclaim-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        run: |
          if [ -f CHANGELOG.md ]; then
            sed -n "/^## ${GITHUB_REF_NAME}/,/^## /p" CHANGELOG.md | sed '$d' > release_notes.md
          else
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_notes.md
          generate_release_notes: true
